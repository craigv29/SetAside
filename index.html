const getQuarter = (d) => Math.floor(new Date(d + "T00:00:00").getMonth() / 3) + 1;
const getMonthIndex = (d) => new Date(d + "T00:00:00").getMonth();

function guessReceiptInfo(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const priceRe = /\$?\s?(\d{1,4}\.\d{2})/g;
  const totalRe = /(total|balance due|amount due|grand total)/i;
  let amount = null;
  for (const line of lines) {
    if (!totalRe.test(line)) continue;
    const nums = [...line.matchAll(priceRe)].map((m) => parseFloat(m[1]));
    if (nums.length) { amount = Math.max(...nums); break; }
  }
  if (amount === null) {
    const all = [...text.matchAll(priceRe)].map((m) => parseFloat(m[1]));
    if (all.length) amount = Math.max(...all);
  }
  const description = lines.find((l) => /[a-zA-Z]{3,}/.test(l) && !totalRe.test(l)) || "";
  return { amount, description: description.slice(0, 60) };
}

// ---------------------------- Supabase data layer ----------------------------
async function fetchIncome(userId) {
  const { data, error } = await sb.from("income_entries").select("*").eq("user_id", userId).order("date", { ascending: false });
  return error ? [] : data;
}
async function fetchExpenses(userId) {
  const { data, error } = await sb.from("expense_entries").select("*").eq("user_id", userId).order("date", { ascending: false });
  return error ? [] : data;
}
async function fetchSettings(userId) {
  const { data, error } = await sb.from("user_settings").select("*").eq("user_id", userId).maybeSingle();
  if (error || !data) return DEFAULT_SETTINGS;
  return { mileageRate: Number(data.mileage_rate), seTaxRate: Number(data.se_tax_rate), incomeTaxRate: Number(data.income_tax_rate), state: data.state || "", tier: data.tier || "free" };
}
async function insertIncome(userId, e) {
  const { data, error } = await sb.from("income_entries").insert([{ user_id: userId, date: e.date, source: e.source, gross: e.gross, fees: e.fees }]).select().single();
  return error ? null : data;
}
async function insertExpense(userId, e) {
  const { data, error } = await sb.from("expense_entries").insert([{ user_id: userId, date: e.date, category: e.category, amount: e.amount, miles: e.miles, notes: e.notes || null }]).select().single();
  return error ? null : data;
}
async function deleteIncomeRow(id) { await sb.from("income_entries").delete().eq("id", id); }
async function deleteExpenseRow(id) { await sb.from("expense_entries").delete().eq("id", id); }
async function upsertSettings(userId, s) {
  await sb.from("user_settings").upsert({ user_id: userId, mileage_rate: s.mileageRate, se_tax_rate: s.seTaxRate, income_tax_rate: s.incomeTaxRate, state: s.state, tier: s.tier || "free" });
}
async function deleteAllData(userId) {
  await sb.from("income_entries").delete().eq("user_id", userId);
  await sb.from("expense_entries").delete().eq("user_id", userId);
  await sb.from("user_settings").delete().eq("user_id", userId);
}

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setChecking(false); });
    const { data: listener } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.bg }}>
        <Spinner />
      </div>
    );
  }
  return session ? <MainApp session={session} /> : <AuthScreen />;
}

// ================================ Auth screen ================================
function AuthScreen() {
  const [mode, setMode] = useState("signin"); // signin | signup | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");

  const submit = async () => {
    setError(""); setNotice("");
    if (!email.trim() || (mode !== "reset" && password.length < 6)) {
      setError(mode === "reset" ? "Enter your email above." : "Password needs to be at least 6 characters.");
      return;
    }
    setLoading(true);
    if (mode === "signup") {
      const { data, error } = await sb.auth.signUp({ email: email.trim(), password });
      setLoading(false);
      if (error) return setError(error.message);
      if (!data.session) setNotice("Account created! Check your email to confirm it, then log in.");
    } else if (mode === "signin") {
      const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
      setLoading(false);
      if (error) return setError(error.message);
    } else {
      const { error } = await sb.auth.resetPasswordForEmail(email.trim());
      setLoading(false);
      if (error) return setError(error.message);
      setNotice("Check your email for a password reset link.");
    }
  };

  return (
    <div className="min-h-screen" style={{ background: COLORS.bg, color: COLORS.text }}>
      <BrandHeader subtitle="Know what to keep. Know what to set aside." />
      <main className="px-5 max-w-md mx-auto pt-2">
        <Card>
          <h2 className="text-lg font-extrabold mb-1">
            {mode === "signup" ? "Create your account" : mode === "reset" ? "Reset your password" : "Log in"}
          </h2>
          <p className="text-sm mb-4" style={{ color: COLORS.sub }}>
            {mode === "signup" ? "Takes less than a minute. Your data stays private to you." : mode === "reset" ? "We'll email you a link to set a new one." : "Welcome back — pick up right where you left off."}
          </p>
          <div className="space-y-3">
            <div>
              <FieldLabel>Your email</FieldLabel>
              <input type="email" autoComplete="email" value={email} onChange={(e) => setEmail(e.target.value)}
                className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} placeholder="you@example.com" />
            </div>
            {mode !== "reset" && (
              <div>
                <FieldLabel>Your password</FieldLabel>
                <input type="password" autoComplete={mode === "signup" ? "new-password" : "current-password"} value={password}
                  onChange={(e) => setPassword(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} placeholder="At least 6 characters" />
              </div>
            )}
            {error && <p className="text-sm font-semibold" style={{ color: COLORS.spent }}>{error}</p>}
            {notice && <p className="text-sm font-semibold" style={{ color: COLORS.earned }}>{notice}</p>}
            <button onClick={submit} disabled={loading} className="w-full rounded-xl py-3 font-bold text-white text-base mt-1 flex items-center justify-center gap-2"
              style={{ background: COLORS.earned, opacity: loading ? 0.7 : 1 }}>
              {loading && <Spinner size={16} color="#fff" />}
              {mode === "signup" ? "Create my account" : mode === "reset" ? "Send reset link" : "Log in"}
            </button>
          </div>
        </Card>

        <div className="text-center mt-4 text-sm" style={{ color: COLORS.sub }}>
          {mode === "signin" && (
            <>
              <button onClick={() => { setMode("signup"); setError(""); setNotice(""); }} className="font-bold" style={{ color: COLORS.tax }}>
                Don't have an account? Sign up
              </button>
              <div className="mt-2">
                <button onClick={() => { setMode("reset"); setError(""); setNotice(""); }} style={{ color: COLORS.sub }}>

              Back to log in
            </button>
          )}
        </div>
      </main>
    </div>
  );
}

// ================================= Main app =================================
function MainApp({ session }) {
  const userId = session.user.id;
  const [tab, setTab] = useState("home");
  const [loading, setLoading] = useState(true);
  const [income, setIncome] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [toast, setToast] = useState("");

  useEffect(() => {
    (async () => {
      const [inc, exp, set] = await Promise.all([fetchIncome(userId), fetchExpenses(userId), fetchSettings(userId)]);
      setIncome(inc); setExpenses(exp); setSettings(set); setLoading(false);
    })();
  }, [userId]);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  const addIncome = useCallback(async (entry) => {
    const row = await insertIncome(userId, entry);
    if (row) { setIncome((prev) => [row, ...prev]); flash("Added what you earned."); }
    else flash("Couldn't save that — check your connection.");
  }, [userId]);

  const addExpense = useCallback(async (entry) => {
    const row = await insertExpense(userId, entry);
    if (row) { setExpenses((prev) => [row, ...prev]); flash("Added what you spent."); }
    else flash("Couldn't save that — check your connection.");
  }, [userId]);

  const removeIncome = async (id) => { setIncome((prev) => prev.filter((e) => e.id !== id)); await deleteIncomeRow(id); };
  const removeExpense = async (id) => { setExpenses((prev) => prev.filter((e) => e.id !== id)); await deleteExpenseRow(id); };
  const updateSettings = async (next) => { setSettings(next); await upsertSettings(userId, next); flash("Settings saved."); };
  const resetAll = async () => {
    setIncome([]); setExpenses([]); setSettings(DEFAULT_SETTINGS);
    await deleteAllData(userId); flash("Everything cleared.");
  };
  const logout = async () => { await sb.auth.signOut(); };

  const totals = useMemo(() => {
    const totalEarned = income.reduce((s, e) => s + (Number(e.gross) - Number(e.fees || 0)), 0);
    const mileageTotal = expenses.reduce((s, e) => s + Number(e.miles || 0) * settings.mileageRate, 0);
    const directExpenses = expenses.reduce((s, e) => s + Number(e.amount || 0), 0);
    const totalSpent = mileageTotal + directExpenses;
    const netProfit = totalEarned - totalSpent;
    const setAsideRate = settings.seTaxRate + settings.incomeTaxRate;
    const taxToSetAside = Math.max(netProfit, 0) * setAsideRate;
    const keepForYou = Math.max(netProfit - taxToSetAside, 0);
    return { totalEarned, totalSpent, netProfit, taxToSetAside, keepForYou, setAsideRate };
  }, [income, expenses, settings]);

  const quarterly = useMemo(() => {
    const b = { 1: { earned: 0, spent: 0 }, 2: { earned: 0, spent: 0 }, 3: { earned: 0, spent: 0 }, 4: { earned: 0, spent: 0 } };
    income.forEach((e) => { b[getQuarter(e.date)].earned += Number(e.gross) - Number(e.fees || 0); });
    expenses.forEach((e) => { b[getQuarter(e.date)].spent += Number(e.amount || 0) + Number(e.miles || 0) * settings.mileageRate; });
    return b;
  }, [income, expenses, settings]);

  const monthly = useMemo(() => {
    const b = Array.from({ length: 12 }, () => ({ earned: 0, spent: 0 }));
    income.forEach((e) => { b[getMonthIndex(e.date)].earned += Number(e.gross) - Number(e.fees || 0); });
    expenses.forEach((e) => { b[getMonthIndex(e.date)].spent += Number(e.amount || 0) + Number(e.miles || 0) * settings.mileageRate; });
    return b;
  }, [income, expenses, settings]);

  if (loading) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.bg }}><Spinner /></div>;
  }

  return (
    <div className="min-h-screen pb-24" style={{ background: COLORS.bg, color: COLORS.text }}>
      <BrandHeader subtitle="Know what to keep. Know what to set aside." />
      <main className="px-5 max-w-md mx-auto">
        {tab === "home" && <HomeTab totals={totals} quarterly={quarterly} monthly={monthly} income={income} expenses={expenses} isPro={settings.tier === "pro"} />}
        {tab === "earned" && <EarnedTab income={income} onAdd={addIncome} onRemove={removeIncome} />}
        {tab === "spent" && <SpentTab expenses={expenses} onAdd={addExpense} onRemove={removeExpense} mileageRate={settings.mileageRate} />}
        {tab === "settings" && <SettingsTab settings={settings} onSave={updateSettings} onReset={resetAll} email={session.user.email} onLogout={logout} isPro={settings.tier === "pro"} />}
      </main>

      {toast && (
        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-sm font-semibold shadow-lg" style={{ background: COLORS.text, color: "#fff" }}>
          {toast}
        </div>
      )}

      <nav className="fixed bottom-0 left-0 right-0 flex justify-center" style={{ background: COLORS.card, borderTop: `1px solid ${COLORS.border}` }}>
        <div className="flex w-full max-w-md">
          <NavBtn icon={HomeIcon} label="Home" active={tab === "home"} onClick={() => setTab("home")} color={COLORS.text} />
          <NavBtn icon={PlusCircleIcon} label="I got paid" active={tab === "earned"} onClick={() => setTab("earned")} color={COLORS.earned} />
          <NavBtn icon={MinusCircleIcon} label="I spent money" active={tab === "spent"} onClick={() => setTab("spent")} color={COLORS.spent} />
          <NavBtn icon={GearIcon} label="Settings" active={tab === "settings"} onClick={() => setTab("settings")} color={COLORS.text} />
        </div>
      </nav>
    </div>
  );
}

          <p className="text-xs font-bold mb-1" style={{ color: COLORS.earned }}>TOTAL EARNED</p>

        </Card>
        <Card style={{ background: COLORS.spentSoft, border: "none" }}>
          <p className="text-xs font-bold mb-1" style={{ color: COLORS.spent }}>TOTAL SPENT</p>
          <p className="text-2xl font-extrabold" style={{ color: COLORS.spent }}>{fmt$(totals.totalSpent)}</p>
        </Card>
      </div>

      <Card>
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-bold" style={{ color: COLORS.sub }}>{breakdownView === "quarter" ? "BY 3-MONTH PERIOD" : "BY MONTH"}</p>
          <div className="flex rounded-full p-0.5" style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }}>
            <button onClick={() => setBreakdownView("quarter")} className="text-xs font-bold px-3 py-1 rounded-full" style={breakdownView === "quarter" ? { background: COLORS.tax, color: "#fff" } : { color: COLORS.sub }}>3-Month</button>
            <button onClick={() => setBreakdownView("month")} className="text-xs font-bold px-3 py-1 rounded-full" style={breakdownView === "month" ? { background: COLORS.tax, color: "#fff" } : { color: COLORS.sub }}>Monthly</button>
          </div>
        </div>
        {breakdownView === "quarter" ? (
          <div className="space-y-2">
            {[1, 2, 3, 4].map((q) => (
              <div key={q} className="flex items-center justify-between text-sm">
                <span style={{ color: COLORS.sub }}>{qLabels[q]}</span>
                <span className="font-semibold">{fmt$(quarterly[q].earned - quarterly[q].spent)} <span style={{ color: COLORS.sub }}>kept</span></span>

            ))}

          <div className="space-y-2">
            {monthLabels.map((label, i) => {

              return (
                <div key={label} className="flex items-center justify-between text-sm" style={{ opacity: hasActivity ? 1 : 0.4 }}>
                  <span style={{ color: COLORS.sub }}>{label}</span>
                  <span className="font-semibold">{fmt$(monthly[i].earned - monthly[i].spent)} <span style={{ color: COLORS.sub }}>kept</span></span>
                </div>
              );
            })}
          </div>
        )}
      </Card>

      <Card>
        <p className="text-sm font-bold mb-3" style={{ color: COLORS.sub }}>LATEST ACTIVITY</p>
        {recent.length === 0 ? (
          <p className="text-sm py-4 text-center" style={{ color: COLORS.sub }}>Nothing yet. Tap "I got paid" or "I spent money" below to add your first entry.</p>
        ) : (
          <div className="divide-y" style={{ borderColor: COLORS.border }}>
            {recent.map((e) => (
              <div key={e.kind + e.id} className="flex justify-between items-center py-2">
                <div>
                  <p className="text-sm font-semibold">{e.kind === "earned" ? e.source : e.category}</p>
                  <p className="text-xs" style={{ color: COLORS.sub }}>{fmtDate(e.date)}</p>
                </div>
                <span className="font-bold" style={{ color: e.kind === "earned" ? COLORS.earned : COLORS.spent }}>
                  {e.kind === "earned" ? "+" : "-"}{fmt$(e.kind === "earned" ? Number(e.gross) - Number(e.fees || 0) : Number(e.amount || 0))}
                </span>
              </div>
            ))}
          </div>
        )}
      </Card>

      {!isPro && <ProUpgradeBanner />}
      {isPro && (
        <Card>
          <p className="text-sm font-bold mb-2 flex items-center gap-1.5" style={{ color: COLORS.tax }}><CrownIcon size={16} color={COLORS.tax} /> Pro features</p>
          <p className="text-sm mb-3" style={{ color: COLORS.sub }}>You can export your full year&apos;s data as a CSV or a tax-ready quarterly report.</p>
          <button className="w-full rounded-xl py-2.5 font-bold text-sm text-white mb-2" style={{ background: COLORS.tax }}>Export as CSV</button>
          <button className="w-full rounded-xl py-2.5 font-bold text-sm" style={{ border: `1.5px solid ${COLORS.tax}`, color: COLORS.tax }}>Download quarterly report (PDF)</button>
        </Card>
      )}
    </div>
  );
}

function EarnedTab({ income, onAdd, onRemove }) {
  const [date, setDate] = useState(todayStr());
  const [source, setSource] = useState("");
  const [gross, setGross] = useState("");
  const [fees, setFees] = useState("");

  const submit = () => {
    if (!source.trim() || !gross || Number(gross) <= 0) return;
    onAdd({ date, source: source.trim(), gross: Number(gross), fees: Number(fees) || 0 });
    setSource(""); setGross(""); setFees("");
  };

  return (
    <div className="space-y-4 pt-1">
      <Card>
        <h2 className="text-lg font-extrabold mb-4">Add money you got paid</h2>
        <div className="space-y-3">
          <div><FieldLabel>When did you get paid?</FieldLabel>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>Who paid you? (app, client, job)</FieldLabel>
            <input type="text" placeholder="e.g. DoorDash, Etsy, John's house painting" value={source} onChange={(e) => setSource(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>How much did they pay you?</FieldLabel>
            <input type="number" inputMode="decimal" placeholder="0.00" value={gross} onChange={(e) => setGross(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>Did they take out any fees? (optional)</FieldLabel>
            <input type="number" inputMode="decimal" placeholder="0.00" value={fees} onChange={(e) => setFees(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <button onClick={submit} className="w-full rounded-xl py-3 font-bold text-white text-base mt-2" style={{ background: COLORS.earned }}>Save this</button>
        </div>
      </Card>
      <p className="text-xs font-bold px-1" style={{ color: COLORS.sub }}>EVERYTHING YOU'VE ADDED</p>
      <div className="space-y-2">
        {income.map((e) => (
          <Card key={e.id}>
            <div className="flex justify-between items-center">
              <div>
                <p className="font-semibold">{e.source}</p>
                <p className="text-xs" style={{ color: COLORS.sub }}>{fmtDate(e.date)} · paid {fmt$(Number(e.gross))}{Number(e.fees) > 0 ? ` · ${fmt$(Number(e.fees))} fee` : ""}</p>
              </div>
              <div className="flex items-center gap-3">
                <span className="font-bold" style={{ color: COLORS.earned }}>+{fmt$(Number(e.gross) - Number(e.fees || 0))}</span>
                <button onClick={() => onRemove(e.id)} aria-label="Delete entry"><TrashIcon size={16} color={COLORS.sub} /></button>
              </div>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ================================= Spent tab =================================
const EXPENSE_CATEGORIES = ["Gas & driving", "Supplies", "Equipment", "Phone / internet", "Other"];
function SpentTab({ expenses, onAdd, onRemove, mileageRate }) {
  const [date, setDate] = useState(todayStr());
  const [category, setCategory] = useState(EXPENSE_CATEGORIES[0]);
  const [amount, setAmount] = useState("");
  const [miles, setMiles] = useState("");
  const [notes, setNotes] = useState("");
  const isDriving = category === "Gas & driving";

  const [scanning, setScanning] = useState(false);
  const [scanMessage, setScanMessage] = useState("");
  const [scanError, setScanError] = useState("");
  const [rawText, setRawText] = useState("");
  const [showRawText, setShowRawText] = useState(false);
  const fileInputRef = React.useRef(null);

  const handleReceiptFile = async (file) => {
    if (!file) return;
    setScanError(""); setRawText(""); setShowRawText(false); setScanning(true);
    setScanMessage("Warming up the scanner (first time can take a little longer)...");
    try {
      const worker = await Tesseract.createWorker("eng");
      setScanMessage("Reading your receipt...");
      const { data } = await worker.recognize(file);
      await worker.terminate();
      setRawText(data.text || "");
      const guess = guessReceiptInfo(data.text || "");
      setCategory("Other");
      if (guess.amount) setAmount(String(guess.amount));
      else setScanError("We couldn't find a clear total on that photo — check the amount below, or try a clearer picture.");
      if (guess.description) setNotes(guess.description);
    } catch (err) {
      setScanError("Something went wrong reading that photo. Try a clearer picture, or just fill it in below.");
    } finally {
      setScanning(false);
      setScanMessage("");
    }
  };

  const submit = () => {
    if ((!amount || Number(amount) <= 0) && (!miles || Number(miles) <= 0)) return;
    onAdd({ date, category, amount: Number(amount) || 0, miles: isDriving ? Number(miles) || 0 : 0, notes: notes.trim() || null });
    setAmount(""); setMiles(""); setNotes(""); setRawText(""); setScanError("");
  };

  return (
    <div className="space-y-4 pt-1">
      <Card>
        <h2 className="text-lg font-extrabold mb-1">Add money you spent</h2>
        <p className="text-sm mb-4" style={{ color: COLORS.sub }}>Snap a photo of the receipt, or just type it in below.</p>

        <input ref={fileInputRef} type="file" accept="image/*" capture="environment" className="hidden"
          onChange={(e) => { handleReceiptFile(e.target.files[0]); e.target.value = ""; }} />
        <button onClick={() => fileInputRef.current.click()} disabled={scanning}
          className="w-full rounded-xl py-3 font-bold text-base mb-4 flex items-center justify-center gap-2"
          style={{ border: `1.5px dashed ${COLORS.tax}`, color: COLORS.tax, opacity: scanning ? 0.7 : 1 }}>
          {scanning ? <Spinner size={16} color={COLORS.tax} /> : <CameraIcon size={18} />}
          {scanning ? scanMessage : "Scan a receipt"}
        </button>
        {scanError && <p className="text-sm font-semibold mb-3" style={{ color: COLORS.spent }}>{scanError}</p>}
        {rawText && (
          <div className="mb-4">
            <button onClick={() => setShowRawText((v) => !v)} className="text-xs font-bold" style={{ color: COLORS.sub }}>
              {showRawText ? "Hide" : "See"} what we read from the photo
            </button>
            {showRawText && (
              <pre className="text-xs mt-2 p-2 rounded-lg whitespace-pre-wrap" style={{ background: COLORS.bg, color: COLORS.sub, border: `1px solid ${COLORS.border}` }}>{rawText}</pre>
            )}
          </div>
        )}

        <div className="flex items-center gap-2 mb-4">
          <div className="flex-1 h-px" style={{ background: COLORS.border }} />
          <span className="text-xs font-bold" style={{ color: COLORS.sub }}>OR ENTER IT YOURSELF</span>
          <div className="flex-1 h-px" style={{ background: COLORS.border }} />
        </div>

        <div className="space-y-3">
          <div><FieldLabel>When did you spend it?</FieldLabel>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>What kind of expense?</FieldLabel>
            <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle}>
              {EXPENSE_CATEGORIES.map((c) => <option key={c}>{c}</option>)}
            </select></div>
          {isDriving && (
            <div>
              <FieldLabel><span className="inline-flex items-center gap-1.5"><CarIcon size={14} /> How many miles did you drive?</span></FieldLabel>
              <input type="number" inputMode="decimal" placeholder="0" value={miles} onChange={(e) => setMiles(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} />
              <p className="text-xs mt-1" style={{ color: COLORS.sub }}>We'll turn this into a dollar amount for you, at {fmt$(mileageRate)}/mile.</p>
            </div>
          )}
          <div><FieldLabel>{isDriving ? "Any other cost (gas, tolls)? optional" : "How much did you spend?"}</FieldLabel>
            <input type="number" inputMode="decimal" placeholder="0.00" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>Add a note (optional)</FieldLabel>
            <input type="text" placeholder="e.g. printer paper, oil change, new drill bits" value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} />
            <p className="text-xs mt-1" style={{ color: COLORS.sub }}>Helpful for itemizing later — totally optional.</p>
          </div>
          <button onClick={submit} className="w-full rounded-xl py-3 font-bold text-white text-base mt-2" style={{ background: COLORS.spent }}>Save this</button>
        </div>
      </Card>
      <p className="text-xs font-bold px-1" style={{ color: COLORS.sub }}>EVERYTHING YOU'VE ADDED</p>
      <div className="space-y-2">
        {expenses.map((e) => {
          const mileageAmt = Number(e.miles || 0) * mileageRate;
          return (
            <Card key={e.id}>
              <div className="flex justify-between items-center">
                <div>
                  <p className="font-semibold">{e.category}</p>
                  <p className="text-xs" style={{ color: COLORS.sub }}>{fmtDate(e.date)}{e.miles > 0 ? ` · ${e.miles} miles` : ""}</p>
                  {e.notes && <p className="text-xs italic mt-0.5" style={{ color: COLORS.sub }}>{e.notes}</p>}
                </div>
                <div className="flex items-center gap-3">
                  <span className="font-bold" style={{ color: COLORS.spent }}>-{fmt$(Number(e.amount || 0) + mileageAmt)}</span>
                  <button onClick={() => onRemove(e.id)} aria-label="Delete entry"><TrashIcon size={16} color={COLORS.sub} /></button>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ============================== State tax card ===============================
function StateTaxCard({ settings, onSave }) {
  const state = settings.state || "";
  const isNoTax = NO_INCOME_TAX_STATES.includes(state);
  const searchUrl = (s) => `https://www.google.com/search?q=${encodeURIComponent(s + " official department of revenue self-employment tax")}`;

  return (
    <Card>
      <h3 className="font-bold mb-1 flex items-center gap-1.5"><MapPinIcon size={16} color={COLORS.tax} /> Your state's taxes</h3>
      <p className="text-sm mb-3" style={{ color: COLORS.sub }}>This won't change your number above — it just points you to what to check next.</p>
      <FieldLabel>Pick your state</FieldLabel>
      <select value={state} onChange={(e) => onSave({ ...settings, state: e.target.value })} className="w-full rounded-xl px-3 py-2.5 text-base mb-3" style={inputStyle}>
        <option value="">Choose your state</option>
        {ALL_STATES.map((s) => <option key={s}>{s}</option>)}
      </select>
      {state && isNoTax && (
        <div className="rounded-xl p-3 flex gap-2.5" style={{ background: COLORS.earnedSoft }}>
          <CheckCircleIcon size={18} color={COLORS.earned} />
          <p className="text-sm">Good news — <b>{state}</b> doesn't charge state income tax on what you earn. The estimate above already covers what you actually owe (federal only).</p>
        </div>
      )}
      {state && !isNoTax && (
        <div className="rounded-xl p-3 flex gap-2.5" style={{ background: COLORS.taxSoft }}>
          <InfoIcon size={18} color={COLORS.tax} />
          <div className="text-sm">
            <p className="mb-2"><b>{state}</b> does charge state income tax, and the exact rate depends on your situation. This tool only estimates federal tax — you'll want to add a bit more on top for state.</p>
            <a href={searchUrl(state)} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 font-bold text-sm" style={{ color: COLORS.tax }}>
              Check {state}'s official tax site <ExternalLinkIcon size={14} />
            </a>
          </div>
        </div>
      )}
      <p className="text-xs mt-3" style={{ color: COLORS.sub }}>
        State info last checked {STATE_INFO_LAST_CHECKED}. SetAside is a planning tool, not tax advice — state rules change yearly, so confirm specifics with your state's tax agency or a tax professional.
      </p>
    </Card>
  );
}

// ================================ Settings tab ================================
function SettingsTab({ settings, onSave, onReset, email, onLogout, isPro }) {
  const [mileageRate, setMileageRate] = useState(settings.mileageRate);
  const [seTaxRate, setSeTaxRate] = useState(settings.seTaxRate * 100);
  const [incomeTaxRate, setIncomeTaxRate] = useState(settings.incomeTaxRate * 100);
  const [confirmReset, setConfirmReset] = useState(false);

  const save = () => onSave({ ...settings, mileageRate: Number(mileageRate) || 0, seTaxRate: Number(seTaxRate) / 100, incomeTaxRate: Number(incomeTaxRate) / 100 });

  return (
    <div className="space-y-4 pt-1">
      <Card>
        <div className="flex justify-between items-center">
          <div>
            <p className="text-xs font-bold" style={{ color: COLORS.sub }}>SIGNED IN AS</p>
            <p className="font-semibold">{email}</p>
          </div>
          <button onClick={onLogout} className="flex items-center gap-1.5 text-sm font-bold px-3 py-2 rounded-xl" style={{ border: `1.5px solid ${COLORS.border}` }}>
            <LogOutIcon size={15} /> Log out
          </button>
        </div>
      </Card>

      <ProUpgradeCard isPro={isPro} />

      <Card>
        <h2 className="text-lg font-extrabold mb-1">Settings</h2>
        <p className="text-sm mb-4" style={{ color: COLORS.sub }}>These numbers control how your tax estimate is calculated. The starting numbers are reasonable defaults, but check with a tax professional for your exact situation.</p>
        <div className="space-y-3">
          <div><FieldLabel>Mileage rate ($ per mile driven)</FieldLabel>
            <input type="number" step="0.01" value={mileageRate} onChange={(e) => setMileageRate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} /></div>
          <div><FieldLabel>Self-employment tax rate (%)</FieldLabel>
            <input type="number" step="0.1" value={seTaxRate} onChange={(e) => setSeTaxRate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} />
            <p className="text-xs mt-1" style={{ color: COLORS.sub }}>15.3% is the standard rate covering Social Security and Medicare.</p></div>
          <div><FieldLabel>Income tax rate (%)</FieldLabel>
            <input type="number" step="0.1" value={incomeTaxRate} onChange={(e) => setIncomeTaxRate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-base" style={inputStyle} />
            <p className="text-xs mt-1" style={{ color: COLORS.sub }}>This varies based on your total yearly income. 10–12% is common for smaller side hustles.</p></div>
          <button onClick={save} className="w-full rounded-xl py-3 font-bold text-white text-base mt-2" style={{ background: COLORS.tax }}>Save settings</button>
        </div>
      </Card>

      <StateTaxCard settings={settings} onSave={onSave} />

      <Card>
        <h3 className="font-bold mb-2">Start over</h3>
        <p className="text-sm mb-3" style={{ color: COLORS.sub }}>This deletes everything you've entered. This can't be undone.</p>
        {!confirmReset ? (
          <button onClick={() => setConfirmReset(true)} className="w-full rounded-xl py-2.5 font-bold text-sm" style={{ border: `1.5px solid ${COLORS.spent}`, color: COLORS.spent }}>Clear all my data</button>
        ) : (
          <div className="flex gap-2">
            <button onClick={() => { onReset(); setConfirmReset(false); }} className="flex-1 rounded-xl py-2.5 font-bold text-sm text-white" style={{ background: COLORS.spent }}>Yes, delete it all</button>
            <button onClick={() => setConfirmReset(false)} className="flex-1 rounded-xl py-2.5 font-bold text-sm" style={{ border: `1.5px solid ${COLORS.border}` }}>Cancel</button>
          </div>
        )}
      </Card>
    </div>
  );
}
